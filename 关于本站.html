<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于本站</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

    :root {
      --bg: #faf8f5;
      --bg-warm: #f5f0ea;
      --bg-card: #ffffff;
      --ink: #2c2825;
      --ink-secondary: #5a534c;
      --muted: #9a928a;
      --rule: #e8e2da;
      --rule-strong: #d4cdc4;
      --accent: #c2553a;
      --accent-soft: #e8d4cf;
      --accent-deep: #a0422e;
      --teal: #3a8c7c;
      --teal-soft: #d4eae5;
      --slate: #4a6670;
      --slate-soft: #dde8ec;
      --gold: #b8860b;
      --gold-soft: #f0e6cc;
      --code-bg: #2c2825;
      --code-ink: #e0dbd5;
      --code-muted: #7a746c;
      --code-keyword: #c2553a;
      --code-string: #3a8c7c;
      --code-comment: #7a746c;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(44,40,37,0.06);
      --shadow-md: 0 4px 16px rgba(44,40,37,0.08);
      --shadow-lg: 0 8px 32px rgba(44,40,37,0.1);
      --shadow-card: 0 1px 0 var(--rule), var(--shadow-md);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection { background: var(--accent-soft); color: var(--accent-deep); }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250,248,245,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--rule);
      box-shadow: var(--shadow-sm);
      transform: translateY(0);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s ease;
    }
    .navbar.hidden {
      transform: translateY(-100%);
      box-shadow: none;
    }
    .navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }
    .navbar-nav {
      display: flex;
      gap: 0.25rem;
    }
    .navbar-link {
      padding: 0.5rem 1.25rem;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-secondary);
      transition: all var(--transition);
      white-space: nowrap;
      position: relative;
    }
    .navbar-link::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: var(--accent-soft);
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }
    .navbar-link:hover {
      color: var(--accent);
    }
    .navbar-link:hover::before {
      opacity: 1;
      transform: scale(1);
    }
    .navbar-link.active {
      color: var(--accent);
      font-weight: 600;
    }
    .navbar-link.active::before {
      opacity: 1;
      transform: scale(1);
    }

    .hero {
      position: relative;
      padding: 5rem 2rem 4rem;
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(194,85,58,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(58,140,124,0.04) 0%, transparent 50%),
        var(--bg);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c2553a' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      position: relative;
    }
    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      width: 2rem;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .hero h1 {
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 1rem;
      position: relative;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 300;
      position: relative;
      letter-spacing: 0.08em;
    }

    .page-layout {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 2.25rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-card);
      scroll-margin-top: 4.5rem;
      transition: box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }
    .section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--teal), var(--gold));
      opacity: 0;
      transition: opacity var(--transition);
    }
    .section:hover::before { opacity: 1; }
    .section:hover { box-shadow: 0 1px 0 var(--rule-strong), var(--shadow-lg); }

    .section-head {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .section-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--bg);
      background: var(--accent);
      padding: 0.35rem 0.65rem;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }
    .section h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
    }

    h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.02rem;
      font-weight: 600;
      color: var(--ink);
      margin: 1.8rem 0 0.6rem;
      padding-left: 0.9rem;
      border-left: 3px solid var(--accent);
      line-height: 1.5;
    }
    p { margin-bottom: 0.8rem; color: var(--ink-secondary); }
    strong { color: var(--accent-deep); font-weight: 600; }
    mark.key {
      background: var(--accent-soft);
      color: var(--accent-deep);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-weight: 600;
    }

    ul, ol {
      margin: 0.4rem 0 1rem 1.5rem;
      color: var(--ink-secondary);
    }
    li { margin-bottom: 0.35rem; }

    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: var(--bg-warm);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      color: var(--accent-deep);
      border: 1px solid var(--rule);
      font-weight: 500;
    }

    .callout {
      border-radius: var(--radius-md);
      padding: 1rem 1.2rem;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    .callout-default {
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
    }
    .callout-warning {
      background: var(--gold-soft);
      border-left: 4px solid var(--gold);
    }
    .callout-success {
      background: var(--teal-soft);
      border-left: 4px solid var(--teal);
    }
    .callout-title {
      font-weight: 700;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }
    .callout-default .callout-title { color: var(--accent-deep); }
    .callout-warning .callout-title { color: var(--gold); }
    .callout-success .callout-title { color: var(--teal); }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.75rem 0;
    }
    .tag {
      font-size: 0.76rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      background: var(--bg-warm);
      color: var(--slate);
      border: 1px solid var(--rule);
      transition: all var(--transition);
    }
    .tag:hover {
      background: var(--teal-soft);
      border-color: var(--teal);
      color: var(--teal);
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--rule);
      max-width: 1200px;
      margin: 0 auto;
    }
    footer span { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section {
      animation: fadeUp 0.5s ease both;
    }
    .section:nth-child(1)  { animation-delay: 0.05s; }
    .section:nth-child(2)  { animation-delay: 0.10s; }
    .section:nth-child(3)  { animation-delay: 0.15s; }

    @media (prefers-reduced-motion: reduce) {
      .section { animation: none; }
    }

    @media (max-width: 900px) {
      .page-layout {
        padding: 0 1rem 3rem;
      }
      .section { padding: 1.5rem; }
      .hero { padding: 3rem 1.5rem 2.5rem; }
      .navbar-inner { padding: 0.5rem 1rem; }
      .navbar-link { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 1.6rem; }
      .section { padding: 1.25rem; }
      body { font-size: 15px; }
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--bg-warm);
      border: 1px solid var(--rule);
      border-radius: var(--radius-md);
      color: var(--slate);
      text-decoration: none;
      font-size: 0.85rem;
      transition: all var(--transition);
    }
    .social-link:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-deep);
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.2rem 0;
    }
    .feature-item {
      padding: 1rem;
      background: var(--bg-warm);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .feature-icon {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .feature-title {
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    .feature-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>

    <div class="navbar-inner">

  <div class="page-layout">

      <div class="section-head">
        <span class="section-num">02</span>

      <div class="callout callout-default">

  <footer>

  </footer>

  <script>
    const navbar = document.getElementById('navbar');
    let lastScrollY = window.scrollY;
    let ticking = false;

    function updateNavbar() {
      const currentScrollY = window.scrollY;
      const scrollDirection = currentScrollY > lastScrollY ? 'down' : 'up';
      
      if (scrollDirection === 'down' && currentScrollY > 100) {
        navbar.classList.add('hidden');
      } else {
        navbar.classList.remove('hidden');
      }
      
      lastScrollY = currentScrollY;
      ticking = false;
    }

    window.addEventListener('scroll', function() {
      if (!ticking) {
        window.requestAnimationFrame(updateNavbar);
        ticking = true;
      }
    });
  </script>
</body>
</html>
