<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>期末复习总结</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

    :root {
      --bg: #faf8f5;
      --bg-warm: #f5f0ea;
      --bg-card: #ffffff;
      --ink: #2c2825;
      --ink-secondary: #5a534c;
      --muted: #9a928a;
      --rule: #e8e2da;
      --accent: #c2553a;
      --accent-soft: #e8d4cf;
      --accent-deep: #a0422e;
      --teal: #3a8c7c;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 20px rgba(44,40,37,0.08);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      width: 2rem;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .hero h1 {
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
      transition: all var(--transition);
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--teal));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(44,40,37,0.12);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-meta {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      margin-top: 1rem;
      padding: 0.3rem 0.6rem;
      background: var(--accent-soft);
      border-radius: 4px;
    }

    .footer {
      text-align: center;
      padding-top: 4rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--rule);
      margin-top: 3rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }

    @media (max-width: 480px) {
      .container { padding: 2.5rem 1rem 4rem; }
      .hero h1 { font-size: 1.6rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-eyebrow">Final Review</div>
      <h1>期末复习总结</h1>
      <p class="hero-subtitle">课程知识点梳理 &middot; 核心考点汇总 &middot; 高效备考指南</p>
    </header>

    <div class="card-grid">
      <a href="JavaWeb期末复习总结.html" class="card">
        <div class="card-icon">💻</div>
        <div class="card-title">JavaWeb</div>
        <div class="card-desc">Servlet、JSP、Spring 框架等核心知识点总结</div>
        <div class="card-meta">Web 开发</div>
      </a>

      <a href="数据库期末复习总结.html" class="card">
        <div class="card-icon">🗄️</div>
        <div class="card-title">数据库</div>
        <div class="card-desc">MySQL 基础、SQL 语句、事务与索引详解</div>
        <div class="card-meta">MySQL</div>
      </a>

      <a href="网络241_网络242_考试安排.html" class="card">
        <div class="card-icon">📅</div>
        <div class="card-title">考试安排</div>
        <div class="card-desc">网络课程 241/242 班考试时间与地点</div>
        <div class="card-meta">考试信息</div>
      </a>

      <a href="关于本站.html" class="card">
        <div class="card-icon">ℹ️</div>
        <div class="card-title">关于本站</div>
        <div class="card-desc">网站简介、使用说明及联系方式</div>
        <div class="card-meta">About</div>
      </a>
    </div>

    <footer class="footer">
      <p>期末复习助手 &middot; 祝你考试顺利</p>
    </footer>
  </div>
</body>
</html>
